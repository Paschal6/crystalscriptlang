// =============================================
// PLAYER ENTITY
// =============================================

declare hero set entity
player hero

health hero set 100
hero.maxHealth set 100
hero.x set 200
hero.y set 500
hero.vx set 0
hero.vy set 0
hero.dir set 1
hero.weaponIdx set 0
hero.shootTimer set 0
hero.isGrounded set False
hero.isFlying set False
hero.fuel set MAX_FUEL

// =============================================
// BOT SYSTEM
// =============================================

declare botNames set ["Shadow", "Viper", "Ghost", "Blaze", "Striker"]
declare botColors set ["#ef4444", "#f97316", "#eab308", "#22c55e", "#06b6d4"]

declare bots set []

func spawnBot(index) {
  declare b set entity
  bot b

  b.name set botNames[index]
  b.color set botColors[index]
  health b set 80
  b.maxHealth set 80

  // spawn on random platform
  declare plat set platforms[index + 4]
  b.x set plat.x + plat.w / 2
  b.y set plat.y - PLAYER_H - 5
  b.vx set 0
  b.vy set 0
  b.dir set 1
  b.shootTimer set 0
  b.thinkTimer set 0
  b.state set "patrol"
  b.isFlying set False
  b.fuel set MAX_FUEL

  add bots(b)
}

// spawn 5 bots
for i in range(0, 5) {
  spawnBot(i)
}

// =============================================
// BULLETS & PARTICLES
// =============================================

declare bullets set []
declare particles set []

declare kills set 0
declare deaths set 0
declare screenShake set 0

// =============================================
// PARTICLE SYSTEM
// =============================================

func spawnParticles(x, y, count, particleColor, speed) {
  for i in range(0, count) {
    declare angle set random() * 6.28
    declare spd set random() * speed + 1
    declare p set {
      x: x,
      y: y,
      vx: cos(angle) * spd,
      vy: sin(angle) * spd,
      life: 20 + random() * 20,
      maxLife: 40,
      color: particleColor,
      size: 1 + random() * 3
    }
    add particles(p)
  }
}

// =============================================
// SHOOTING SYSTEM
// =============================================

func shootBullet(x, y, targetX, targetY, wp, owner) {
  declare angle set atan2(targetY - y, targetX - x)
  angle set angle + (random() - 0.5) * wp.spread

  declare bulletCount set 1
  when wp.name is "Shotgun" {
    bulletCount set 5
  }

  for i in range(0, bulletCount) {
    declare a set angle
    when bulletCount > 1 {
      a set angle + (random() - 0.5) * wp.spread * 3
    }

    declare b set {
      x: x,
      y: y,
      vx: cos(a) * wp.bulletSpeed,
      vy: sin(a) * wp.bulletSpeed,
      owner: owner,
      life: 60
    }

    when wp.name is "Rocket" {
      b.life set 120
    }

    add bullets(b)
  }

  // screen shake
  when owner is "player" {
    when wp.name is "Rocket" {
      screenShake set 8
    }
    when wp.name is "Shotgun" {
      screenShake set 6
    }
    when wp.name is "Sniper" {
      screenShake set 5
    }
    otherwise {
      screenShake set 2
    }
  }
}

// =============================================
// COLLISION / PHYSICS
// =============================================

func resolvePhysics(ent) {
  declare nx set ent.x + ent.vx
  declare ny set ent.y + ent.vy

  for plat in platforms {
    // vertical collision
    when nx < plat.x + plat.w and nx + PLAYER_W > plat.x {
      when ent.vy > 0 and ent.y + PLAYER_H <= plat.y and ny + PLAYER_H > plat.y {
        ny set plat.y - PLAYER_H
        ent.vy set 0
        ent.isGrounded set True
      }
      when ent.vy < 0 and ent.y >= plat.y + plat.h and ny < plat.y + plat.h {
        ny set plat.y + plat.h
        ent.vy set 0
      }
    }

    // horizontal collision
    when ny < plat.y + plat.h and ny + PLAYER_H > plat.y {
      when ent.vx > 0 and ent.x + PLAYER_W <= plat.x and nx + PLAYER_W > plat.x {
        nx set plat.x - PLAYER_W
        ent.vx set 0
      }
      when ent.vx < 0 and ent.x >= plat.x + plat.w and nx < plat.x + plat.w {
        nx set plat.x + plat.w
        ent.vx set 0
      }
    }
  }

  ent.x set nx
  ent.y set ny
}

func checkHit(bx, by, ent) {
  show bx > ent.x and bx < ent.x + PLAYER_W and by > ent.y and by < ent.y + PLAYER_H
}

// =============================================
// BOT AI — think / train / remember
// =============================================

func botThink(b) {
  b.thinkTimer set b.thinkTimer - 1

  when b.thinkTimer <= 0 {
    b.thinkTimer set 30 + random() * 30

    declare dx set hero.x - b.x
    declare dy set hero.y - b.y
    declare dist set sqrt(dx * dx + dy * dy)

    when health hero > 0 and dist < 500 {
      when dist < 250 {
        b.state set "attack"
      }
      otherwise {
        b.state set "chase"
      }
    }
    otherwise {
      b.state set "patrol"
    }
  }
}

func botMove(b) {
  match b.state {
    "patrol" {
      b.vx set b.dir * 1.5
      when b.x < 40 or b.x > SCREEN_W - 40 {
        b.dir set b.dir * -1
      }
      when random() < 0.02 {
        b.dir set b.dir * -1
      }
    }

    "chase" {
      declare dx set hero.x - b.x
      b.dir set 1
      when dx < 0 {
        b.dir set -1
      }
      b.vx set b.dir * 2.5

      when hero.y < b.y - 60 and b.fuel > 20 {
        b.isFlying set True
      }
      otherwise {
        b.isFlying set False
      }
    }

    "attack" {
      declare dx set hero.x - b.x
      b.dir set 1
      when dx < 0 {
        b.dir set -1
      }
      b.vx set b.dir * 1

      b.shootTimer set b.shootTimer - 1
      when b.shootTimer <= 0 and health hero > 0 {
        declare tx set hero.x + PLAYER_W / 2 + (random() - 0.5) * 30
        declare ty set hero.y + PLAYER_H / 2 + (random() - 0.5) * 30
        shootBullet(b.x + PLAYER_W / 2, b.y + PLAYER_H / 2, tx, ty, weapons[0], "bot")
        b.shootTimer set 20 + random() * 15
      }

      when hero.y < b.y - 40 and b.fuel > 10 {
        b.isFlying set True
      }
      otherwise {
        b.isFlying set False
      }
    }
  }

  // jetpack
  when b.isFlying and b.fuel > 0 {
    fly b
    b.vy set b.vy + FLY_FORCE * 0.8
    b.fuel set b.fuel - FUEL_USE * 0.6
  }
  when not b.isFlying {
    b.fuel set min(b.fuel + FUEL_REGEN * 0.5, MAX_FUEL)
  }

  // gravity
  b.vy set b.vy + GRAVITY
  when b.vy > 12 {
    b.vy set 12
  }

  // physics
  resolvePhysics(b)

  // random jump
  when b.isGrounded and random() < 0.03 {
    jump b
    b.vy set JUMP_FORCE * 0.8
  }
}

// =============================================
// PLAYER INPUT
// =============================================

func handleInput() {
  declare moveX set 0
  when press "a" or press "ArrowLeft" {
    moveX set -1
  }
  when press "d" or press "ArrowRight" {
    moveX set 1
  }
  hero.vx set moveX * PLAYER_SPEED
  when moveX != 0 {
    hero.dir set moveX
  }

  // jump
  when press "w" or press "ArrowUp" or press " " {
    when hero.isGrounded {
      jump hero
      hero.vy set JUMP_FORCE
    }
  }

  // fly (jetpack)
  hero.isFlying set False
  when press "w" or press "ArrowUp" or press " " {
    when not hero.isGrounded and hero.fuel > 0 {
      fly hero
      hero.vy set hero.vy + FLY_FORCE
      hero.fuel set hero.fuel - FUEL_USE
      hero.isFlying set True
      spawnParticles(hero.x + PLAYER_W / 2, hero.y + PLAYER_H, 2, "#fbbf24", 2)
    }
  }

  // fuel regen
  when hero.isGrounded and hero.fuel < MAX_FUEL {
    hero.fuel set hero.fuel + FUEL_REGEN * 3
  }
  when not hero.isFlying and hero.fuel < MAX_FUEL {
    hero.fuel set hero.fuel + FUEL_REGEN
  }
  hero.fuel set min(hero.fuel, MAX_FUEL)
}

func handleShooting() {
  declare wp set weapons[hero.weaponIdx]
  hero.shootTimer set max(0, hero.shootTimer - 1)

  when click mouse or (wp.auto and press mouse) {
    when hero.shootTimer <= 0 and wp.ammo > 0 {
      declare mx set mouse.x + camera.x
      declare my set mouse.y + camera.y
      shootBullet(hero.x + PLAYER_W / 2, hero.y + PLAYER_H / 2, mx, my, wp, "player")
      wp.ammo set wp.ammo - 1
      hero.shootTimer set wp.fireRate
      spawnParticles(hero.x + PLAYER_W / 2 + hero.dir * 12, hero.y + PLAYER_H / 2, 3, wp.color, 2)
    }
  }
}

// =============================================
// BULLET UPDATE
// =============================================

func updateBullets() {
  for b in bullets {
    b.x set b.x + b.vx
    b.y set b.y + b.vy
    when b.owner is "player" {
      b.vy set b.vy + 0.05
    }
    b.life set b.life - 1

    // wall collision
    for plat in platforms {
      when b.x > plat.x and b.x < plat.x + plat.w and b.y > plat.y and b.y < plat.y + plat.h {
        spawnParticles(b.x, b.y, 4, "#888", 2)
        b.life set 0
      }
    }

    // hit bots
    when b.owner is "player" {
      for enemy in bots {
        when health enemy > 0 and checkHit(b.x, b.y, enemy) {
          declare wp set weapons[hero.weaponIdx]
          damage enemy(wp.damage)
          health enemy set health enemy - wp.damage
          spawnParticles(b.x, b.y, 6, enemy.color, 3)
          screenShake set max(screenShake, 3)
          b.life set 0

          // enemy killed
          when health enemy <= 0 {
            spawnParticles(enemy.x + PLAYER_W / 2, enemy.y + PLAYER_H / 2, 20, enemy.color, 5)
            explosion(enemy.x, enemy.y)
            kills set kills + 1
            score hero set kills

            // respawn enemy after 3 seconds
            respawn enemy
          }
        }
      }
    }

    // hit player
    when b.owner is "bot" and health hero > 0 {
      when checkHit(b.x, b.y, hero) {
        damage hero(10)
        health hero set health hero - 10
        spawnParticles(b.x, b.y, 5, "#f87171", 3)
        screenShake set max(screenShake, 4)
        b.life set 0

        when health hero <= 0 {
          spawnParticles(hero.x + PLAYER_W / 2, hero.y + PLAYER_H / 2, 30, "#f87171", 6)
          explosion(hero.x, hero.y)
          deaths set deaths + 1
          respawn hero
        }
      }
    }

    // remove dead bullets
    when b.life <= 0 {
      rem bullets()
    }
  }
}

// =============================================
// PICKUP SYSTEM
// =============================================

func updatePickups() {
  for pk in pickups {
    when not pk.active {
      pk.respawnTimer set pk.respawnTimer - 1
      when pk.respawnTimer <= 0 {
        pk.active set True
      }
      skip
    }

    when health hero > 0 and collide(hero, pk) {
      when pk.type is "health" {
        heal hero(30)
        health hero set min(health hero + 30, hero.maxHealth)
        spawnParticles(pk.x, pk.y, 8, "#4ade80", 3)
      }

      when pk.type is "ammo" {
        for wp in weapons {
          wp.ammo set wp.maxAmmo
        }
        spawnParticles(pk.x, pk.y, 8, "#facc15", 3)
      }

      when pk.type is "weapon" {
        hero.weaponIdx set pk.weaponIndex
        weapons[pk.weaponIndex].ammo set weapons[pk.weaponIndex].maxAmmo
        spawnParticles(pk.x, pk.y, 10, weapons[pk.weaponIndex].color, 4)
      }

      pk.active set False
      pk.respawnTimer set 300
    }
  }
}

// =============================================
// PARTICLE UPDATE
// =============================================

func updateParticles() {
  for p in particles {
    p.x set p.x + p.vx
    p.y set p.y + p.vy
    p.vy set p.vy + 0.1
    p.vx set p.vx * 0.97
    p.life set p.life - 1

    when p.life <= 0 {
      rem particles()
    }
  }
}

// =============================================
// CAMERA SYSTEM
// =============================================

declare cam set camera
cam.x set 0
cam.y set 0

func updateCamera() {
  declare targetX set hero.x + PLAYER_W / 2 - SCREEN_W / 2
  declare targetY set hero.y + PLAYER_H / 2 - SCREEN_H / 2
  follow cam(hero)
  cam.x set cam.x + (targetX - cam.x) * 0.1
  cam.y set cam.y + (targetY - cam.y) * 0.1
}

// =============================================
// RENDERING
// =============================================

func drawEntity(ent, entColor, isPlayer, entName) {
  // jetpack flames
  when ent.isFlying {
    color "#fbbf24"
    declare flameH set 5 + random() * 8
    draw rect(ent.x + 5, ent.y + PLAYER_H, 4, flameH)
    draw rect(ent.x + PLAYER_W - 9, ent.y + PLAYER_H, 4, flameH)
  }

  // body
  color entColor
  draw rect(ent.x + 4, ent.y + 10, PLAYER_W - 8, PLAYER_H - 10)

  // head
  when isPlayer {
    color "#e2e8f0"
  }
  draw circle(ent.x + PLAYER_W / 2, ent.y + 8, 8)

  // eyes
  color "#000"
  declare eyeX set ent.x + PLAYER_W / 2 + ent.dir * 3
  draw rect(eyeX - 1, ent.y + 6, 2, 3)

  // gun
  color "#94a3b8"
  draw rect(ent.x + PLAYER_W / 2, ent.y + 16, 14 * ent.dir, 3)

  // jetpack backpack
  color "#475569"
  declare jpX set ent.x - 2
  when ent.dir > 0 {
    jpX set ent.x - 2
  }
  otherwise {
    jpX set ent.x + PLAYER_W - 4
  }
  draw rect(jpX, ent.y + 12, 6, 14)

  // health bar above
  declare barW set 24
  declare barX set ent.x + PLAYER_W / 2 - barW / 2
  declare barY set ent.y - 10
  declare hpRatio set health ent / ent.maxHealth

  color "#1e293b"
  draw rect(barX, barY, barW, 3)

  when hpRatio > 0.5 {
    color "#4ade80"
  }
  when hpRatio > 0.25 and hpRatio <= 0.5 {
    color "#facc15"
  }
  when hpRatio <= 0.25 {
    color "#ef4444"
  }
  draw rect(barX, barY, barW * hpRatio, 3)

  // name tag
  color "#94a3b8"
  label entName(ent.x + PLAYER_W / 2, barY - 4)
}

func renderScene() {
  // background
  color "#0f172a"
  draw rect(0, 0, SCREEN_W, SCREEN_H)

  // grid lines
  color "rgba(100, 116, 139, 0.08)"
  for gx in range(0, SCREEN_W) {
    when gx % 40 is 0 {
      draw line(gx, 0, gx, SCREEN_H)
    }
  }
  for gy in range(0, SCREEN_H) {
    when gy % 40 is 0 {
      draw line(0, gy, SCREEN_W, gy)
    }
  }

  // platforms
  for plat in platforms {
    when plat.type is "ground" {
      color "#334155"
      draw rect(plat.x, plat.y, plat.w, plat.h)
      color "#475569"
      draw rect(plat.x, plat.y, plat.w, 3)
    }
    when plat.type is "wall" {
      color "#1e293b"
      draw rect(plat.x, plat.y, plat.w, plat.h)
    }
    when plat.type is "platform" {
      color "#374151"
      draw rect(plat.x, plat.y, plat.w, plat.h)
      color "#6366f1"
      draw rect(plat.x, plat.y, plat.w, 3)
    }
  }

  // pickups
  for pk in pickups {
    when pk.active {
      when pk.type is "health" {
        color "#4ade80"
        sprite "health_cross"(pk.x, pk.y)
      }
      when pk.type is "ammo" {
        color "#facc15"
        sprite "ammo_box"(pk.x, pk.y)
      }
      when pk.type is "weapon" {
        color weapons[pk.weaponIndex].color
        sprite "weapon_pickup"(pk.x, pk.y)
      }
    }
  }

  // bots
  for b in bots {
    when health b > 0 {
      drawEntity(b, b.color, False, b.name)
    }
  }

  // player
  when health hero > 0 {
    drawEntity(hero, "#8b5cf6", True, "You")
  }

  // bullets
  for b in bullets {
    when b.owner is "player" {
      color weapons[hero.weaponIdx].color
    }
    otherwise {
      color "#ef4444"
    }
    draw rect(b.x - 2, b.y - 2, 4, 4)
  }

  // particles
  for p in particles {
    color p.color
    draw rect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size)
  }
}

// =============================================
// HUD
// =============================================

func renderHUD() {
  declare wp set weapons[hero.weaponIdx]

  // health bar
  hud "health_bar" {
    bar health hero(25, 37, 150, 8)
    label "HEALTH"(25, 33)
    label toText(health hero)(180, 45)
  }

  // fuel bar
  hud "fuel_bar" {
    bar hero.fuel(25, 60, 150, 5)
    color "#38bdf8"
    label "FUEL"(25, 58)
  }

  // weapon info
  hud "weapon_info" {
    color wp.color
    label wp.name(25, 93)
    label "Ammo: " + toText(wp.ammo) + "/" + toText(wp.maxAmmo)(120, 93)
  }

  // weapon slots 1-5
  for i in range(0, 5) {
    declare sx set 240 + i * 42
    button weapons[i].name(sx, 15, 38, 24)
    label toText(i + 1)(sx + 19, 27)
  }

  // score
  hud "score" {
    color "#4ade80"
    label "KILLS: " + toText(kills)(SCREEN_W - 25, 35)
    color "#f87171"
    label "DEATHS: " + toText(deaths)(SCREEN_W - 25, 53)
  }

  // crosshair
  when health hero > 0 {
    color "#ffffff"
    draw circle(mouse.x, mouse.y, 1.5)
    draw line(mouse.x - 8, mouse.y, mouse.x - 3, mouse.y)
    draw line(mouse.x + 3, mouse.y, mouse.x + 8, mouse.y)
    draw line(mouse.x, mouse.y - 8, mouse.x, mouse.y - 3)
    draw line(mouse.x, mouse.y + 3, mouse.x, mouse.y + 8)
  }

  // death screen
  when health hero <= 0 {
    color "rgba(0,0,0,0.5)"
    draw rect(0, 0, SCREEN_W, SCREEN_H)
    color "#ef4444"
    label "ELIMINATED"(SCREEN_W / 2, SCREEN_H / 2 - 10)
    label "Respawning..."(SCREEN_W / 2, SCREEN_H / 2 + 25)
  }

  // controls hint
  color "#475569"
  label "WASD: Move & Fly | Mouse: Aim & Shoot | 1-5: Weapons"(SCREEN_W / 2, SCREEN_H - 8)
}

// =============================================
// WEAPON SWITCH — key input
// =============================================

func handleWeaponSwitch() {
  when press "1" { hero.weaponIdx set 0 }
  when press "2" { hero.weaponIdx set 1 }
  when press "3" { hero.weaponIdx set 2 }
  when press "4" { hero.weaponIdx set 3 }
  when press "5" { hero.weaponIdx set 4 }
}

// =============================================
// MAIN GAME LOOP
// =============================================

dis("=== Mini Militia Started ===")
dis("CrystalScript Game Engine v2.0")
lbr

start

loop {
  // player
  handleInput()
  handleShooting()
  handleWeaponSwitch()

  // gravity
  hero.vy set hero.vy + GRAVITY
  when hero.vy > 12 {
    hero.vy set 12
  }

  // physics
  hero.isGrounded set False
  resolvePhysics(hero)

  // bots AI
  for b in bots {
    when health b > 0 {
      botThink(b)
      botMove(b)
    }
  }

  // world
  updateBullets()
  updatePickups()
  updateParticles()
  updateCamera()

  // screen shake
  when screenShake > 0 {
    shake cam(screenShake)
    screenShake set screenShake * 0.85
    when screenShake < 0.3 {
      screenShake set 0
    }
  }

  // render
  render scene
  renderScene()
  renderHUD()

crystal
version "2.0"

// Variables
declare name set "CrystalScript"
declare version set 2.0

dis("Welcome to " + name + "!")
dis("Version: " + toText(version))
lbr

// Arrays with add & rem
declare fruits set ["apple", "banana"]
add fruits("cherry")
add fruits("mango")
dis("Fruits: " + toText(fruits))
rem fruits()
dis("After rem: " + toText(fruits))
lbr

// Functions
func greet(person) {
  dis("Hello, " + person + "!")
}

greet("Developer")
greet("World")
lbr

// Loops
dis("Counting:")
for i in range(1, 6) {
  dis("  " + toText(i))
}
lbr

// Logic
declare score set 95
when score >= 90 {
  dis("Grade: A")
}
when score < 90 and score >= 80 {
  dis("Grade: B")
}

dis("Done!")`},{name:"game.crystal",language:"crystalscript",content:`// Mini Game Demo in CrystalScript
crystal

game "Adventure"
scene "Level 1"

declare hero set entity
player hero
health hero set 100
hero.name set "Warrior"

declare enemies set []
add enemies("Goblin")
add enemies("Skeleton")
add enemies("Dragon")

dis("=== " + hero.name + "'s Adventure ===")
dis("Health: " + toText(health hero))
lbr

dis("Enemies encountered:")
for enemy in enemies {
  dis("  ⚔️ " + enemy)
}
lbr

// Battle simulation
func battle(enemyName, dmg) {
  dis("Fighting " + enemyName + "...")
  damage hero(dmg)
  health hero set health hero - dmg
  dis("  Took " + toText(dmg) + " damage!")
  dis("  Health: " + toText(health hero))
  lbr
}

battle("Goblin", 10)
battle("Skeleton", 20)

when health hero > 50 {
  dis("Hero survives! Ready for Dragon!")
}

dis("=== Game Over ===")`}]}]},"html-website":{name:"html-website",folders:[{name:"website",open:!0,files:[{name:"index.html",language:"html",content:`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My CrystalScript Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">💎 CrystalScript</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <header id="home" class="hero">
    <h1>Welcome to CrystalScript</h1>
    <p>A modern scripting language for everyone</p>
    <button class="btn" onclick="alert('Hello from CrystalScript!')">Get Started</button>
  </header>

  <section id="about" class="section">
    <h2>About</h2>
    <p>CrystalScript is a clean, intuitive programming language with game engine support.</p>
    <div class="cards">
      <div class="card">
        <h3>🚀 Fast</h3>
        <p>Lightning-fast execution with modern architecture.</p>
      </div>
      <div class="card">
        <h3>🎮 Games</h3>
        <p>Built-in game engine with physics and rendering.</p>
      </div>
      <div class="card">
        <h3>🧠 AI</h3>
        <p>AI system with think, train, and model support.</p>
      </div>
    </div>
  </section>

  <section id="features" class="section dark">
    <h2>Key Features</h2>
    <ul class="feature-list">
      <li>✅ declare & fix for variables</li>
      <li>✅ dis() for output</li>
      <li>✅ add & rem for arrays</li>
      <li>✅ when / otherwise for logic</li>
      <li>✅ func for functions</li>
      <li>✅ lbr for line breaks</li>
      <li>✅ Built-in game engine</li>
      <li>✅ AI & multiplayer support</li>
    </ul>
  </section>

  <footer>
    <p>&copy; 2025 CrystalScript. Built with ❤️</p>
  </footer>
</body>
</html>`},{name:"style.css",language:"css",content:`* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: #e2e8f0;
  background: #0f172a;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 32px;
  background: rgba(15, 23, 42, 0.95);
  border-bottom: 1px solid #1e293b;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: #a78bfa;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 24px;
}

.nav-links a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: #e2e8f0;
}

/* Hero */
.hero {
  text-align: center;
  padding: 120px 32px;
  background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #1a1a2e 100%);
}

.hero h1 {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  font-size: 20px;
  color: #94a3b8;
  margin-bottom: 32px;
}

.btn {
  padding: 14px 32px;
  background: linear-gradient(135deg, #8b5cf6, #6366f1);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);
}

/* Sections */
.section {
  padding: 80px 32px;
  max-width: 900px;
  margin: 0 auto;
}

.section h2 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 16px;
  color: #f1f5f9;
}

.section p {
  color: #94a3b8;
  font-size: 16px;
  line-height: 1.7;
  margin-bottom: 32px;
}

.section.dark {
  background: #1e293b;
  max-width: 100%;
  padding: 80px 32px;
}

.section.dark h2,
.section.dark p {
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 24px;
  transition: border-color 0.2s;
}

.card:hover {
  border-color: #8b5cf6;
}

.card h3 {
  font-size: 18px;
  margin-bottom: 8px;
}

.card p {
  font-size: 14px;
  color: #94a3b8;
}

/* Feature list */
.feature-list {
  list-style: none;
  max-width: 900px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.feature-list li {
  font-size: 15px;
  color: #cbd5e1;
  padding: 8px 0;
}

/* Footer */
footer {
  text-align: center;
  padding: 32px;
  color: #64748b;
  border-top: 1px solid #1e293b;
  font-size: 14px;
}`}]}]},"empty-project":{name:"empty-project",folders:[{name:"src",open:!0,files:[{name:"index.html",language:"html",content:`<!DOCTYPE html>

    minimum = data[i]
  }
  when data[i] > maximum {
    maximum = data[i]
  }
}

lbr

  sum = sum + data[i]

lbr

  dis("HP: " + toText(hp) + " | Gold: " + toText(gold))
  dis("Items: " + toText(inventory))

  dis("⚔️ A wild " + enemy + " appears! (HP: " + toText(enemyHp) + ")")

  declare rounds = 0
  while enemyHp > 0 and hp > 0 {
    rounds = rounds + 1
    declare playerDmg = 15 + rounds * 2
    declare enemyDmg = 5 + rounds

    enemyHp = enemyHp - playerDmg
    dis("  You deal " + toText(playerDmg) + " damage!")

    when enemyHp > 0 {
      hp = hp - enemyDmg
      dis("  " + enemy + " hits you for " + toText(enemyDmg) + "!")
    }
  }

  when hp > 0 {
    dis("✅ You defeated the " + enemy + "!")
    gold = gold + reward
    dis("  +" + toText(reward) + " gold!")
  }
  otherwise {
    dis("💀 You were defeated...")
  }
  lbr
}

status()
encounter("Goblin", 30, 10)
status()`},{id:"fizzbuzz-challenge",title:"FizzBuzz Challenge",description:"The classic coding challenge in CrystalScript",category:"Examples",difficulty:"Beginner",code:`// FizzBuzz in CrystalScript
