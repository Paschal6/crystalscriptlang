  damage: 7
  bulletSpeed: 13
  ammo: 24
  maxAmmo: 24
  spread: 0.2
  color: "#f87171"
  auto: False
})

add weapons({
  name: "Sniper"
  fireRate: 45
  damage: 45
  bulletSpeed: 28
  ammo: 12
  maxAmmo: 12
  spread: 0.005
  color: "#60a5fa"
  auto: False
})

add weapons({
  name: "Rocket"
  fireRate: 60
  damage: 60
  bulletSpeed: 8
  ammo: 6
  maxAmmo: 6
  spread: 0.02
  color: "#f43f5e"
  auto: False
})

# =============================================
# MAP / PLATFORMS
# =============================================

declare platforms = []

# ground
add platforms({ x: 0, y: 670, w: 1200, h: 30, type: "ground" })

# arena platforms
add platforms({ x: 80, y: 540, w: 180, h: 14, type: "platform" })
add platforms({ x: 350, y: 450, w: 160, h: 14, type: "platform" })
add platforms({ x: 600, y: 520, w: 200, h: 14, type: "platform" })
add platforms({ x: 900, y: 420, w: 150, h: 14, type: "platform" })

# =============================================
# PLAYER ENTITY
# =============================================

declare hero = entity
player hero

health hero = 100
hero.maxHealth = 100
hero.x = 200
hero.y = 500
hero.vx = 0
hero.vy = 0
hero.dir = 1
hero.weaponIdx = 0
hero.shootTimer = 0
hero.isGrounded = False
hero.isFlying = False
hero.fuel = MAX_FUEL

# =============================================
# BOT SYSTEM
# =============================================

declare botNames = "Shadow", "Viper", "Ghost", "Blaze", "Striker"
letarr botColors = "#ef4444", "#f97316", "#eab308", "#22c55e", "#06b6d4"

declare bots = []

func spawnBot(index) {
  declare b = entity
  bot b

  b.name = botNames[index]
  b.color = botColors[index]
  health b = 80
  b.maxHealth = 80

  # spawn on random platform
  declare plat = platforms[index + 1]
  b.x = plat.x + plat.w / 2
  b.y = plat.y - PLAYER_H - 5
  b.vx = 0
  b.vy = 0
  b.dir = 1
  b.shootTimer = 0
  b.thinkTimer = 0
  b.state = "patrol"
  b.isFlying = False
  b.fuel = MAX_FUEL

  add bots(b)
}

# spawn 5 bots
for i in range(0, 5) {
  spawnBot(i)
}

# =============================================
# MAIN GAME LOOP
# =============================================

crystal
start game

loop {
  # player
  move hero
  shoot hero
  
  # physics
  resolvePhysics(hero)

  # bots
  for b in bots {
    when health b > 0 {
      think b
      move b
    }
  }

  # world
  detect collision
  render scene
}
